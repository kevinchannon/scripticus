name: Release to PyPI

on:
  push:
    tags:
      # One release run per pushed tag: GitHub starts an independent run for
      # each tag ref, so pushing several release tags at once releases each
      # package separately with no coordination needed here. The tag prefix
      # matches the workspace directory of the package it releases.
      - 'client-v*.*.*'
      - 'schema-v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For creating GitHub release
      id-token: write  # For trusted publishing to PyPI

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for proper version detection

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Parse release tag
        id: parse
        run: |
          COMPONENT=${GITHUB_REF_NAME%%-v*}
          VERSION=${GITHUB_REF_NAME#*-v}
          case "$COMPONENT" in
            client) PACKAGE=scripticus ;;
            schema) PACKAGE=scripticus-schema ;;
            *) echo "::error::unrecognised release tag '$GITHUB_REF_NAME'"; exit 1 ;;
          esac
          {
            echo "COMPONENT=$COMPONENT"
            echo "VERSION=$VERSION"
            echo "PACKAGE=$PACKAGE"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $PACKAGE $VERSION (from $COMPONENT/)"

      - name: Update version in ${{ steps.parse.outputs.COMPONENT }}/pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.parse.outputs.VERSION }}"/' \
            '${{ steps.parse.outputs.COMPONENT }}/pyproject.toml'
          grep '^version' '${{ steps.parse.outputs.COMPONENT }}/pyproject.toml'

      - name: Build ${{ steps.parse.outputs.PACKAGE }}
        run: uv build --package '${{ steps.parse.outputs.PACKAGE }}'

      - name: Verify wheel contents
        run: |
          unzip -l dist/*.whl
          ls -lh dist/

      - name: Wait for the schema dependency to be installable
        if: steps.parse.outputs.COMPONENT == 'client'
        run: |
          REQ=$(grep -o '"scripticus-schema[^"]*"' client/pyproject.toml | tr -d '"')
          echo "Client requires: $REQ"
          # If the matching schema tag was pushed moments ago, its release
          # run may still be in flight; wait for the dependency rather than
          # publishing a client release that cannot be installed (D29).
          uv venv .probe
          for attempt in $(seq 1 30); do
            if uv pip install --python .probe/bin/python --no-cache --dry-run "$REQ"; then
              exit 0
            fi
            echo "'$REQ' not installable yet (attempt $attempt/30), retrying in 10s..."
            sleep 10
          done
          echo "::error::no scripticus-schema release on PyPI satisfies '$REQ' — release the schema package first (D29)"
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses trusted publisher authentication (no API token needed).
          # Every released PyPI project (scripticus, scripticus-schema) must
          # trust this workflow file:
          # https://pypi.org/manage/account/publishing/
          packages-dir: dist/
