name: Release to PyPI

on:
  push:
    tags:
      # One release run per pushed tag: GitHub starts an independent run for
      # each tag ref, so pushing several release tags at once releases each
      # package separately with no coordination needed here. The tag prefix
      # matches the workspace directory of the package it releases.
      - 'client-v*.*.*'
      - 'common-v*.*.*'
      - 'schema-v*.*.*'
      - 'server-v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For creating GitHub release
      id-token: write  # For trusted publishing to PyPI
    outputs:
      VERSION: ${{ steps.parse.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history for proper version detection

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Parse release tag
        id: parse
        run: |
          COMPONENT=${GITHUB_REF_NAME%%-v*}
          VERSION=${GITHUB_REF_NAME#*-v}
          case "$COMPONENT" in
            client) PACKAGE=scripticus ;;
            common) PACKAGE=scripticus-common ;;
            schema) PACKAGE=scripticus-schema ;;
            server) PACKAGE=scripticus-server ;;
            *) echo "::error::unrecognised release tag '$GITHUB_REF_NAME'"; exit 1 ;;
          esac
          {
            echo "COMPONENT=$COMPONENT"
            echo "VERSION=$VERSION"
            echo "PACKAGE=$PACKAGE"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $PACKAGE $VERSION (from $COMPONENT/)"

      - name: Update version in ${{ steps.parse.outputs.COMPONENT }}/pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.parse.outputs.VERSION }}"/' \
            '${{ steps.parse.outputs.COMPONENT }}/pyproject.toml'
          grep '^version' '${{ steps.parse.outputs.COMPONENT }}/pyproject.toml'

      - name: Build ${{ steps.parse.outputs.PACKAGE }}
        run: uv build --package '${{ steps.parse.outputs.PACKAGE }}'

      - name: Verify wheel contents
        run: |
          unzip -l dist/*.whl
          ls -lh dist/

      - name: Wait for internal dependencies to be installable
        # Any component that pins an internal scripticus-* package must not be
        # published before a satisfying release of each exists on PyPI: schema
        # now pins common, and client/server pin both (D29/D51). common pins
        # nothing, so this is a no-op for it. The pins carry a version operator
        # (>=, <, ...); the [project] name line does not, so it is never
        # matched — a package never waits for itself.
        run: |
          REQS=$(grep -oE '"scripticus-[a-z-]+[<>=~!][^"]*"' \
            '${{ steps.parse.outputs.COMPONENT }}/pyproject.toml' | tr -d '"' || true)
          if [ -z "$REQS" ]; then
            echo "${{ steps.parse.outputs.COMPONENT }} has no internal pins; nothing to wait for"
            exit 0
          fi
          uv venv .probe
          # A matching dependency tag pushed moments ago may still be releasing;
          # wait for each pin rather than publishing something uninstallable.
          while IFS= read -r REQ; do
            [ -z "$REQ" ] && continue
            echo "${{ steps.parse.outputs.COMPONENT }} requires: $REQ"
            satisfied=0
            for attempt in $(seq 1 30); do
              if uv pip install --python .probe/bin/python --no-cache --dry-run "$REQ"; then
                satisfied=1
                break
              fi
              echo "'$REQ' not installable yet (attempt $attempt/30), retrying in 10s..."
              sleep 10
            done
            if [ "$satisfied" -ne 1 ]; then
              echo "::error::no PyPI release satisfies '$REQ' — release its package first (D29/D51)"
              exit 1
            fi
          done <<< "$REQS"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Uses trusted publisher authentication (no API token needed).
          # Every released PyPI project (scripticus, scripticus-schema,
          # scripticus-server) must trust this workflow file:
          # https://pypi.org/manage/account/publishing/
          packages-dir: dist/

  docker-image:
    # Server releases also publish a Docker image. Runs only after the PyPI
    # release succeeds, so the two artifacts of a server tag can't diverge.
    needs: release
    if: startsWith(github.ref_name, 'server-v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Stamp release version into server/pyproject.toml
        # The image builds from workspace source, so it needs the same
        # version stamping the release job applied to its own checkout.
        run: |
          sed -i 's/^version = ".*"/version = "${{ needs.release.outputs.VERSION }}"/' \
            server/pyproject.toml
          grep '^version' server/pyproject.toml

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            kevinchannon/scripticus-server:${{ needs.release.outputs.VERSION }}
            kevinchannon/scripticus-server:latest
