name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Install dependencies
      run: uv sync --python ${{ matrix.python-version }}

    - name: Run tests
      run: uv run pytest --tb=short

    - name: Test client CLI version command
      run: uv run scripticus --version

    - name: Test client CLI help
      run: uv run scripticus --help

    - name: Test server CLI version command
      run: uv run scripticus-svr --version

    - name: Test server CLI help
      run: uv run scripticus-svr --help

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Install dependencies
      run: uv sync

    - name: Check code can be imported
      run: uv run python -c "import scripticus; print(f'Import successful, version {scripticus.__version__}')"
