name: Tests

on:
  push:
    branches: [ main, develop ]
    # Doc-only changes don't affect the tests. NOTE: if these jobs are required
    # status checks, a docs-only PR will show them skipped — configure branch
    # protection accordingly (or drop these filters).
    paths-ignore: [ '**.md', 'doc/**', 'LICENSE' ]
  pull_request:
    branches: [ main, develop ]
    paths-ignore: [ '**.md', 'doc/**', 'LICENSE' ]

# Cancel superseded in-progress runs on the same ref so rapid pushes don't burn
# minutes on a full 9-cell matrix that's already stale.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned so CI runs the same Tasktree that's validated locally, rather than
  # whatever is newest on PyPI. Bump deliberately.
  TASKTREE_VERSION: "1.3.2"

jobs:
  build:
    # Verify the workspace wheels build (via the same `tt build` devs and the
    # e2e/release paths use). Pure-python wheels, so one platform is enough.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Install Tasktree
      run: pipx install "tasktree==${{ env.TASKTREE_VERSION }}"

    - name: Build wheels
      run: tt build

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    env:
      # Make `tt unit-test` (which runs `uv run pytest`) resolve to this cell's
      # interpreter, so the matrix stays meaningful.
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Install Tasktree
      run: pipx install "tasktree==${{ env.TASKTREE_VERSION }}"

    - name: Run tests
      run: tt unit-test

    - name: Test client CLI version command
      run: uv run scripticus --version

    - name: Test client CLI help
      run: uv run scripticus --help

    - name: Test server entrypoint help
      run: uv run scripticus-svr --help

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Install dependencies
      run: uv sync

    - name: Check code can be imported
      run: uv run python -c "import scripticus; print(f'Import successful, version {scripticus.__version__}')"
