name: E2E (BATS against the full stack)

# Stands up the whole registry bundle from source (proxy + index + Gitea) via
# the docker-compose e2e overlay, then drives the real `scripticus` client
# through the README's lifecycle from inside a container on the same network.
# All the orchestration lives in tests/run.sh — this job just invokes it, so
# the suite runs identically here and on a developer's machine.
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # ubuntu-latest ships docker + the compose plugin, python3 and curl,
      # which is everything tests/run.sh needs.
      - name: Run the e2e suite
        run: tests/run.sh
