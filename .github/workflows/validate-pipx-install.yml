name: Validate pipx Installation

on:
  workflow_run:
    workflows: ["Release to PyPI"]
    types:
      - completed
  workflow_dispatch:  # Allow manual triggering

jobs:
  validate-installation:
    # Only run if the release workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: Ubuntu
          - os: macos-latest
            platform: macOS
          - os: windows-latest
            platform: Windows

    steps:
      - name: Wait for PyPI propagation
        if: github.event_name == 'workflow_run'
        run: |
          echo "Waiting 90 seconds for PyPI to propagate the new package..."
          sleep 90
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipx
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath

      - name: Install scripticus via pipx
        shell: bash
        env:
          RELEASED_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          VERSION="${RELEASED_TAG#v}"
          if [ -z "$VERSION" ]; then
            # Manual dispatch: no released tag to pin to, just install the latest
            python -m pipx install scripticus
            exit 0
          fi
          # The initial sleep usually covers PyPI propagation, but not always:
          # an unlucky CDN edge can still serve the previous release, which
          # pipx would silently install. Pin the released version and poll
          # until PyPI can actually serve it.
          for attempt in $(seq 1 30); do
            if python -m pipx install "scripticus==$VERSION" --pip-args=--no-cache-dir; then
              exit 0
            fi
            echo "scripticus $VERSION not installable yet (attempt $attempt/30), retrying in 10s..."
            sleep 10
          done
          echo "::error::scripticus $VERSION did not become installable on PyPI in time"
          exit 1

      - name: Get installed scripticus version
        run: scripticus --version

      - name: Test scripticus help
        run: scripticus --help

      - name: Verify installation
        run: echo "✓ scripticus successfully installed via pipx on ${{ matrix.platform }}"

  validate-centos:
    # Only run if the release workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9

    steps:
      - name: Wait for PyPI propagation
        if: github.event_name == 'workflow_run'
        run: |
          echo "Waiting 90 seconds for PyPI to propagate the new package..."
          sleep 90
        shell: bash

      - name: Install Python 3.12 and pip
        run: dnf install -y python3.12 python3-pip
        shell: bash

      - name: Install pipx
        run: |
          pip3 install pipx
          pipx ensurepath
        shell: bash

      - name: Install scripticus via pipx with Python 3.12
        env:
          RELEASED_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          VERSION="${RELEASED_TAG#v}"
          if [ -z "$VERSION" ]; then
            # Manual dispatch: no released tag to pin to, just install the latest
            pipx install --python python3.12 scripticus
            exit 0
          fi
          # The initial sleep usually covers PyPI propagation, but not always:
          # an unlucky CDN edge can still serve the previous release, which
          # pipx would silently install. Pin the released version and poll
          # until PyPI can actually serve it.
          for attempt in $(seq 1 30); do
            if pipx install --python python3.12 "scripticus==$VERSION" --pip-args=--no-cache-dir; then
              exit 0
            fi
            echo "scripticus $VERSION not installable yet (attempt $attempt/30), retrying in 10s..."
            sleep 10
          done
          echo "::error::scripticus $VERSION did not become installable on PyPI in time"
          exit 1
        shell: bash

      - name: Get installed scripticus version
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          scripticus --version
        shell: bash

      - name: Verify installation
        run: echo "✓ scripticus successfully installed via pipx on CentOS Stream 9"
        shell: bash
