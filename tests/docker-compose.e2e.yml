# E2E-only overlay: make the stack fully internal by dropping the base's host
# port publishing. Layered on top of docker-compose.yml + the build overlay:
#
#   -f docker-compose.yml -f tests/docker-compose.build.yml -f tests/docker-compose.e2e.yml
#
# (tests/e2e.sh, via scripts/start-server, composes exactly these three.)
#
# With no host ports the e2e stack can't collide with a dev stack on
# :3000/:8000; the DooD runner reaches it by service name after joining the
# stack network. There is no client service — under DooD the runner *is* the
# client (it installs the wheels and runs BATS itself), so the bundle is only
# the server side.
services:
  gitea:
    ports: !reset []
  proxy:
    ports: !reset []
