# E2E overlay over the shipped docker-compose.yml. Compose the two together:
#
#   docker compose -f docker-compose.yml -f tests/docker-compose.e2e.yml ...
#
# The overlay does two things the shipped compose deliberately does not:
#
#  * builds `index` from server/Dockerfile instead of pulling the published
#    image — so an e2e run validates the Dockerfile still builds, and tests
#    the working tree rather than the last release. (The shipped compose stays
#    pull-based on purpose: the README ships it as a one-command, source-free
#    standup — `curl -LO docker-compose.yml` — so it must not require a build
#    context.)
#
#  * adds the `client-test` service: a real `scripticus` client + BATS that
#    joins the same network and reaches the registry at http://proxy by
#    service name (D45's single front URL, exactly as a real client would).
#
# The client-test service is not started by `up`; it is invoked on demand with
# `docker compose run --rm client-test`, which is what tests/run.sh does.
services:
  index:
    build:
      context: .
      dockerfile: server/Dockerfile

  # The e2e stack is fully internal: nothing is published to host ports, so a
  # run never collides with a dev stack (or anything else) already bound to
  # :3000/:8000. Health checks and Gitea bootstrap happen inside this network
  # via the client-test image as a toolbox (tests/run.sh), not from the host.
  gitea:
    ports: !reset []
  proxy:
    ports: !reset []

  client-test:
    build:
      context: .
      dockerfile: tests/Dockerfile.client
    depends_on:
      - proxy
      - index
    environment:
      # The single front URL a client points at (proxy -> index/gitea, D45).
      SCRIPTICUS_E2E_URL: http://proxy
      # The publish token and namespace are injected by tests/run.sh from the
      # Gitea bootstrap (SCRIPTICUS_E2E_TOKEN / SCRIPTICUS_E2E_NAMESPACE).
    volumes:
      # The whole repo, read-only: gives tests the bats files and fixtures.
      # Client state lives at SCRIPTICUS_HOME (/state, writable) off this mount.
      - ./:/repo:ro
