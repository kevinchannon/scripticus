# The Scripticus registry bundle (ARCHITECTURE.md): the index service plus
# the Gitea instance that provides storage, authentication, and namespace
# ownership. See server/README.md for first-run Gitea setup (creating the
# user/org that owns a namespace and a token to publish with).
#
# The index image is published by the release workflow on server-v* tags.
# To run unreleased local changes instead, build from source:
#   docker build -f server/Dockerfile -t kevinchannon/scripticus-server .
services:
  index:
    image: kevinchannon/scripticus-server:latest
    ports:
      - "8000:8000"
    environment:
      SCRIPTICUS_GITEA_URL: http://gitea:3000
      SCRIPTICUS_INDEX_DB: sqlite:////data/scripticus-index.db
    volumes:
      - index-data:/data
    depends_on:
      - gitea

  gitea:
    image: gitea/gitea:1.24
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__server__ROOT_URL: http://localhost:3000/
    ports:
      - "3000:3000"
    volumes:
      - gitea-data:/data

volumes:
  index-data:
  gitea-data:
