[tool.uv.workspace]
members = ["client", "common", "schema", "server"]

[tool.pytest.ini_options]
# importlib mode lets same-named test modules in different members coexist
# without per-directory __init__.py files. The full-stack end-to-end suite is
# BATS-driven and lives in tests/ (run with tests/run.sh), not pytest.
addopts = "--import-mode=importlib"
